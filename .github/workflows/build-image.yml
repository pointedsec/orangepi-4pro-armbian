name: Build Orange Pi 4 Pro Image

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/enable-tun-module-for-tailscale

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Free disk space
        run: |
          # Remove large pre-installed software to free up disk space
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h

      - name: Checkout build framework
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl device-tree-compiler \
            flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            git gnupg2 libssl-dev lzop python3-dev python3-pip \
            qemu-user-static u-boot-tools uuid-runtime \
            debootstrap kpartx parted xz-utils

      - name: Build image
        run: |
          ./compile.sh build \
            BOARD=orangepi-4pro \
            BRANCH=mainline \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            RELEASE=bookworm \
            SKIP_EXTERNAL_DRIVERS=yes \
            COMPRESS_OUTPUTIMAGE=sha,img,xz \
            EXPERT=yes
        env:
          TERM: xterm

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-armbian-image
          path: output/images/*.xz*
          retention-days: 7
