# config/boards/orangepi-4pro.conf
# Orange Pi 4 Pro - Allwinner A733 / sun60iw2

BOARD_NAME="Orange Pi 4 Pro"
BOARD_VENDOR="Orange Pi"
BOARD_MAINTAINER="community"
BOARDFAMILY="sun60iw2"

# Valid branches: mainline (6.12 LTS), legacy (5.15 BSP), vendor (6.6 BSP)
KERNEL_TARGET="mainline legacy vendor"

# Skip U-Boot compilation - this board uses the vendor bootloader on SD/eMMC
declare -g BOOTCONFIG="none"
