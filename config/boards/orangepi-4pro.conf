# config/boards/orangepi-4pro.conf

BOARD_NAME="Orange Pi 4 Pro"
BOARD_VENDOR="Orange Pi"
BOARD_MAINTAINER="community"
ARCH="arm64"

# Board family (this is what the framework copies into LINUXFAMILY)
BOARDFAMILY="sun60iw2"

# Valid branches for this board
# mainline = Linux 6.12 LTS (generic arm64 build, no hardware-specific support yet)
# legacy   = Vanilla 5.15 LTS + sun60iw2 BSP patchset (HDMI working)
# vendor   = Vanilla 6.6 LTS + sun60iw2 BSP patchset (HDMI working, newer)
KERNEL_TARGET="mainline legacy vendor"

# Kernel source (mainline stable LTS — 6.12 is a long-term support release)
KERNELSOURCE="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
KERNELBRANCH="branch:linux-6.12.y"
KERNEL_MAJOR_MINOR="6.12"

# Kernel config file
KERNEL_CONFIG="linux-sun60iw2-mainline.config"

# Device tree (used when hardware support lands in mainline)
BOOT_FDT_FILE="allwinner/sun60i-a733-orangepi-4pro.dtb"

# Skip U-Boot compilation — this board uses the vendor bootloader on SD/eMMC
declare -g BOOTCONFIG="none"
