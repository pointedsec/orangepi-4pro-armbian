# config/boards/orangepi-4pro.conf
# Orange Pi 4 Pro - Allwinner A733 / sun60iw2

BOARD_NAME="Orange Pi 4 Pro"
BOARD_VENDOR="Orange Pi"
BOARD_MAINTAINER="community"
BOARDFAMILY="sun60iw2"

# Valid branches: legacy (5.15 BSP), vendor (6.6 BSP)
KERNEL_TARGET="legacy vendor"

# Bootloader is a vendor pre-built blob downloaded by build_custom_uboot()
# in the family config. Do NOT set BOOTCONFIG="none" here — that would skip
# the u-boot build stage entirely and prevent build_custom_uboot() from running.
BOOTCONFIG="orangepi_4pro_defconfig"

# Device tree: the DTS is named sun60i-a733-orangepi-4-pro.dts (hyphen between 4 and pro)
FDTFILE="allwinner/sun60i-a733-orangepi-4-pro.dtb"

# Serial console — A733/sun60iw2 uses ttyAS0, not ttyS0
DEFAULT_CONSOLE="ttyAS0,115200"
