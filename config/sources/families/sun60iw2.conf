# config/sources/families/sun60iw2.conf
declare -g LINUXFAMILY="sun60iw2"
declare -g ARCH="arm64"
BRANCHES="mainline legacy vendor"
ATF_COMPILE='no'

# Kernel config file name (without .config extension).
# Maps to config/kernel/linux-sun60iw2-{BRANCH}.config
declare -g LINUXCONFIG="linux-sun60iw2-${BRANCH}"

# Boot script and environment
declare -g BOOTSCRIPT='boot-sun60iw2.cmd:boot.cmd'
declare -g BOOTENV_FILE='sun60iw2.txt'
declare -g OVERLAY_DIR="/boot/dtb/allwinner/overlay"

# Kernel build options
declare -g KERNEL_BTF="no"
declare -g INSTALL_HEADERS="yes"

# Disable Armbian's out-of-tree wireless driver patchset
WIREGUARD="no"
EXTRAWIFI="no"
KERNELDRIVERS="none"
SKIP_EXTRA_DRIVERS="yes"

# Branch-specific kernel sources
# mainline: vanilla Linux 6.12 LTS (generic arm64, no hardware-specific patches yet)
# legacy:   vanilla 5.15 LTS + sun60iw2 BSP patchset (HDMI working)
# vendor:   vanilla 6.6 LTS + sun60iw2 BSP patchset (HDMI working, newer)

case "${BRANCH}" in
    legacy)
        # Vanilla Linux 5.15 LTS + sun60iw2-legacy patchset
        # The patches in archive/sun60iw2-legacy ADD the full Radxa BSP to a
        # clean kernel - they include HDMI/display drivers, A733 DTS, and all
        # vendor support. They must NOT be applied on top of the Radxa BSP repo
        # (which already has them baked in) but on top of vanilla 5.15 LTS.
        declare -g KERNELSOURCE="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
        declare -g KERNELBRANCH="branch:linux-5.15.y"
        declare -g KERNEL_MAJOR_MINOR="5.15"
        declare -g KERNELPATCHDIR="archive/sun60iw2-legacy"
        declare -g SERIALCON="ttyAS0"
        ;;
    vendor)
        # Vanilla Linux 6.6 LTS + sun60iw2-vendor patchset (same principle)
        declare -g KERNELSOURCE="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
        declare -g KERNELBRANCH="branch:linux-6.6.y"
        declare -g KERNEL_MAJOR_MINOR="6.6"
        declare -g KERNELPATCHDIR="archive/sun60iw2-vendor"
        declare -g SERIALCON="ttyAS0"
        ;;
    mainline)
        # Vanilla Linux 6.12 LTS - no BSP patches for mainline
        declare -g KERNELSOURCE="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
        declare -g KERNELBRANCH="branch:linux-6.12.y"
        declare -g KERNEL_MAJOR_MINOR="6.12"
        declare -g SERIALCON="ttyAMA0"
        ;;
esac
